name: Free VPS + Pterodactyl (Quick Tunnel, Protected)

on:
  workflow_dispatch:
    inputs:
      admin_email:
        description: "Email admin Pterodactyl"
        required: true
        default: "admin@example.com"
      admin_user:
        description: "Username admin"
        required: true
        default: "admin"
      admin_pass:
        description: "Password admin (min 8 char)"
        required: true
        default: "ChangeMe123!"
      enable_tmate:
        description: "Aktifin SSH tmate?"
        required: true
        default: "true"
      ddos_test:
        description: "Stress-test ke panel sendiri?"
        required: true
        default: "false"

jobs:
  pterodactyl:
    runs-on: ubuntu-22.04
    timeout-minutes: 350
    defaults:
      run:
        shell: bash

    steps:
      - name: Info
        run: echo "=== Free VPS Pterodactyl + Quick Tunnel + Protect ==="

      - name: Tambah repo PHP & MariaDB
        run: |
          set -euxo pipefail
          sudo apt-get update -y
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y software-properties-common curl ca-certificates apt-transport-https gnupg lsb-release
          sudo add-apt-repository -y ppa:ondrej/php
          curl -sSL https://downloads.mariadb.com/MariaDB/mariadb_repo_setup | sudo bash
          sudo apt-get update -y

      - name: Install semua paket sistem
        run: |
          set -euxo pipefail
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            tar unzip jq cron redis-server mariadb-server nginx fail2ban ufw apache2-utils hping3 openssl \
            php8.1 php8.1-cli php8.1-gd php8.1-mysql php8.1-pdo php8.1-mbstring php8.1-tokenizer \
            php8.1-bcmath php8.1-xml php8.1-fpm php8.1-curl php8.1-zip php8.1-redis
          php -v
          which php
          sudo systemctl enable --now redis-server mariadb php8.1-fpm

      - name: Install Docker + cloudflared + wings
        run: |
          set -euxo pipefail
          curl -fsSL https://get.docker.com -o /tmp/get-docker.sh &
          curl -fsSL -o /tmp/cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb &
          curl -fsSL -o /tmp/wings https://github.com/pterodactyl/wings/releases/latest/download/wings_linux_amd64 &
          curl -fsSL -o /tmp/panel.tar.gz https://github.com/pterodactyl/panel/releases/latest/download/panel.tar.gz &
          wait
          ls -la /tmp/get-docker.sh /tmp/cloudflared.deb /tmp/wings /tmp/panel.tar.gz
          test -s /tmp/panel.tar.gz
          test -s /tmp/wings
          sudo sh /tmp/get-docker.sh
          sudo dpkg -i /tmp/cloudflared.deb
          sudo install -m 0755 /tmp/wings /usr/local/bin/wings
          sudo systemctl enable --now docker
          /usr/local/bin/wings --version || true

      - name: Start Quick Tunnel & ambil URL
        run: |
          set -euxo pipefail
          nohup cloudflared tunnel --no-autoupdate --url http://localhost:80 > /tmp/cf-panel.log 2>&1 &
          nohup cloudflared tunnel --no-autoupdate --url https://localhost:8080 --no-tls-verify > /tmp/cf-wings.log 2>&1 &
          PANEL_URL=""; WINGS_URL=""
          for i in {1..60}; do
            [ -z "$PANEL_URL" ] && PANEL_URL=$(grep -Eo 'https://[a-zA-Z0-9.-]+\.trycloudflare\.com' /tmp/cf-panel.log | head -n1 || true)
            [ -z "$WINGS_URL" ] && WINGS_URL=$(grep -Eo 'https://[a-zA-Z0-9.-]+\.trycloudflare\.com' /tmp/cf-wings.log | head -n1 || true)
            [ -n "$PANEL_URL" ] && [ -n "$WINGS_URL" ] && break
            sleep 2
          done
          if [ -z "$PANEL_URL" ] || [ -z "$WINGS_URL" ]; then
            echo "Gagal ambil URL tunnel"
            cat /tmp/cf-panel.log /tmp/cf-wings.log
            exit 1
          fi
          {
            echo "PANEL_URL=$PANEL_URL"
            echo "WINGS_URL=$WINGS_URL"
            echo "PANEL_FQDN=${PANEL_URL#https://}"
            echo "WINGS_FQDN=${WINGS_URL#https://}"
            echo "DB_PASS=$(openssl rand -hex 16)"
          } >> "$GITHUB_ENV"
          echo "Panel: $PANEL_URL"
          echo "Wings: $WINGS_URL"

      - name: Setup database
        run: |
          set -euxo pipefail
          sudo mysql -u root <<SQL
          CREATE USER 'pterodactyl'@'127.0.0.1' IDENTIFIED BY '${{ env.DB_PASS }}';
          CREATE DATABASE panel;
          GRANT ALL PRIVILEGES ON panel.* TO 'pterodactyl'@'127.0.0.1' WITH GRANT OPTION;
          FLUSH PRIVILEGES;
          SQL

      - name: Extract Panel & init
        run: |
          set -euxo pipefail
          sudo mkdir -p /var/www/pterodactyl
          sudo tar -xzf /tmp/panel.tar.gz -C /var/www/pterodactyl
          test -f /var/www/pterodactyl/artisan
          test -d /var/www/pterodactyl/storage
          test -d /var/www/pterodactyl/bootstrap/cache
          sudo chmod -R 755 /var/www/pterodactyl/storage /var/www/pterodactyl/bootstrap/cache
          sudo cp /var/www/pterodactyl/.env.example /var/www/pterodactyl/.env
          sudo php /var/www/pterodactyl/artisan key:generate --force

      - name: Configure Panel + Admin
        run: |
          set -euxo pipefail
          cd /var/www/pterodactyl
          sudo php artisan p:environment:setup \
            --author="${{ github.event.inputs.admin_email }}" \
            --url="${{ env.PANEL_URL }}" \
            --timezone="UTC" \
            --cache="redis" --session="redis" --queue="redis" \
            --redis-host="127.0.0.1" --redis-pass="null" --redis-port="6379" \
            --settings-ui=true
          sudo php artisan p:environment:database \
            --host="127.0.0.1" --port="3306" --database="panel" \
            --username="pterodactyl" --password="${{ env.DB_PASS }}"
          sudo php artisan migrate --seed --force
          sudo php artisan p:user:make \
            --email="${{ github.event.inputs.admin_email }}" \
            --username="${{ github.event.inputs.admin_user }}" \
            --name-first="Admin" --name-last="User" \
            --password="${{ github.event.inputs.admin_pass }}" --admin=1
          sudo chown -R www-data:www-data /var/www/pterodactyl

      - name: Queue worker + cron
        run: |
          set -euxo pipefail
          (sudo crontab -l 2>/dev/null; echo "* * * * * php /var/www/pterodactyl/artisan schedule:run >> /dev/null 2>&1") | sudo crontab -
          sudo tee /etc/systemd/system/pteroq.service > /dev/null <<'EOF'
          [Unit]
          Description=Pterodactyl Queue Worker
          After=redis-server.service
          [Service]
          User=www-data
          Group=www-data
          Restart=always
          ExecStart=/usr/bin/php /var/www/pterodactyl/artisan queue:work --queue=high,standard,low --sleep=3 --tries=3
          RestartSec=5s
          [Install]
          WantedBy=multi-user.target
          EOF
          sudo systemctl daemon-reload
          sudo systemctl enable --now pteroq.service

      - name: Configure Nginx (rate-limit + security headers)
        run: |
          set -euxo pipefail
          sudo rm -f /etc/nginx/sites-enabled/default
          sudo tee /etc/nginx/conf.d/ratelimit.conf > /dev/null <<'EOF'
          limit_req_zone $binary_remote_addr zone=panel_rl:10m rate=20r/s;
          limit_conn_zone $binary_remote_addr zone=panel_conn:10m;
          EOF
          sudo tee /etc/nginx/sites-available/pterodactyl.conf > /dev/null <<'NGINX'
          server {
              listen 80 default_server;
              server_name _;
              root /var/www/pterodactyl/public;
              index index.php;
              client_max_body_size 100m;
              client_body_timeout 30s;
              client_header_timeout 30s;
              keepalive_timeout 15;
              send_timeout 30;
              sendfile off;

              limit_req zone=panel_rl burst=40 nodelay;
              limit_conn panel_conn 30;

              add_header X-Frame-Options "SAMEORIGIN" always;
              add_header X-Content-Type-Options "nosniff" always;
              add_header X-XSS-Protection "1; mode=block" always;
              add_header Referrer-Policy "strict-origin-when-cross-origin" always;
              add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

              location / { try_files $uri $uri/ /index.php?$query_string; }
              location ~ \.php$ {
                  fastcgi_split_path_info ^(.+\.php)(/.+)$;
                  fastcgi_pass unix:/run/php/php8.1-fpm.sock;
                  fastcgi_index index.php;
                  include fastcgi_params;
                  fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
                  fastcgi_param HTTP_PROXY "";
                  fastcgi_read_timeout 300;
              }
              location ~ /\.(ht|git|env) { deny all; return 404; }
          }
          NGINX
          sudo ln -sf /etc/nginx/sites-available/pterodactyl.conf /etc/nginx/sites-enabled/pterodactyl.conf
          sudo nginx -t
          sudo systemctl restart php8.1-fpm nginx

      - name: Setup Fail2ban + UFW
        run: |
          set -euxo pipefail
          sudo tee /etc/fail2ban/jail.d/pterodactyl.conf > /dev/null <<'EOF'
          [nginx-limit-req]
          enabled  = true
          filter   = nginx-limit-req
          port     = http,https
          logpath  = /var/log/nginx/error.log
          maxretry = 5
          findtime = 60
          bantime  = 600
          EOF
          sudo systemctl enable --now fail2ban
          sudo ufw default deny incoming || true
          sudo ufw default allow outgoing || true
          sudo ufw allow 80/tcp || true
          sudo ufw allow 8080/tcp || true
          sudo ufw allow 2022/tcp || true
          sudo ufw --force enable || true

      - name: Setup Wings service
        run: |
          set -euxo pipefail
          sudo mkdir -p /etc/pterodactyl /var/lib/pterodactyl/volumes
          sudo tee /etc/systemd/system/wings.service > /dev/null <<'EOF'
          [Unit]
          Description=Pterodactyl Wings Daemon
          After=docker.service
          Requires=docker.service
          PartOf=docker.service
          [Service]
          User=root
          WorkingDirectory=/etc/pterodactyl
          LimitNOFILE=4096
          PIDFile=/var/run/wings/daemon.pid
          ExecStart=/usr/local/bin/wings
          Restart=on-failure
          RestartSec=5s
          [Install]
          WantedBy=multi-user.target
          EOF
          sudo systemctl daemon-reload

      - name: Auto-create Location, Node, Allocation
        run: |
          set -euxo pipefail
          cd /var/www/pterodactyl
          sudo php artisan p:location:make --short="auto" --long="Auto Location" || true
          LOC_ID=$(sudo mysql -u pterodactyl -p"${{ env.DB_PASS }}" -h 127.0.0.1 -N -e "SELECT id FROM panel.locations LIMIT 1;")
          DAEMON_TOKEN=$(openssl rand -hex 32)
          DAEMON_TOKEN_ID=$(openssl rand -hex 8)
          sudo mysql -u pterodactyl -p"${{ env.DB_PASS }}" -h 127.0.0.1 panel <<SQL
          INSERT INTO nodes (uuid, public, name, description, location_id, fqdn, scheme, behind_proxy, memory, memory_overallocate, disk, disk_overallocate, upload_size, daemon_token_id, daemon_token, daemonListen, daemonSFTP, daemonBase, created_at, updated_at)
          VALUES (UUID(), 1, 'AutoNode', 'Auto', $LOC_ID, '${{ env.WINGS_FQDN }}', 'https', 1, 8192, 0, 50000, 0, 100, '$DAEMON_TOKEN_ID', '$DAEMON_TOKEN', 8080, 2022, '/var/lib/pterodactyl/volumes', NOW(), NOW());
          SQL
          NODE_ID=$(sudo mysql -u pterodactyl -p"${{ env.DB_PASS }}" -h 127.0.0.1 -N -e "SELECT id FROM panel.nodes ORDER BY id DESC LIMIT 1;")
          sudo php artisan p:node:allocations --node=$NODE_ID --ip=0.0.0.0 --ports="25565-25575" || true
          sudo php artisan p:node:configuration $NODE_ID | sudo tee /etc/pterodactyl/config.yml > /dev/null
          sudo systemctl enable --now wings
          sleep 5
          sudo systemctl is-active wings || sudo journalctl -u wings --no-pager -n 50

      - name: Hasil
        run: |
          echo "=========================================="
          echo " SELESAI! Login panel:"
          echo " URL  : ${{ env.PANEL_URL }}"
          echo " User : ${{ github.event.inputs.admin_user }}"
          echo " Pass : ${{ github.event.inputs.admin_pass }}"
          echo " Wings: ${{ env.WINGS_URL }}"
          echo "=========================================="
          echo " Proteksi: Cloudflare + Nginx rate-limit"
          echo " + Fail2ban + UFW + Security Headers"
          echo "=========================================="

      - name: Stress test
        if: ${{ github.event.inputs.ddos_test == 'true' }}
        run: |
          echo "=== ApacheBench: 5000 req / 200 concurrent ==="
          ab -n 5000 -c 200 "${{ env.PANEL_URL }}/" || true
          echo "=== Burst 500 req paralel ==="
          seq 1 500 | xargs -n1 -P50 -I{} curl -s -o /dev/null -w "%{http_code}\n" "${{ env.PANEL_URL }}/" | sort | uniq -c
          echo "Banyak 403/429/503 = anti-DDoS jalan."

      - name: tmate SSH
        if: ${{ github.event.inputs.enable_tmate == 'true' }}
        uses: mxschmitt/action-tmate@v3
        with:
          limit-access-to-actor: true
          detached: false
