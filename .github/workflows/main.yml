name: Pterodactyl Full (Panel + Wings) di Runner Publik

on:
  workflow_dispatch:
    inputs:
      admin_email:
        description: 'Email admin panel'
        required: true
        default: 'admin@panel.local'
      admin_user:
        description: 'Username admin'
        required: true
        default: 'yanzz'
      admin_pass:
        description: 'Password admin'
        required: true
        default: '7819159772'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y curl wget nginx mariadb-server redis-server php8.1-fpm php8.1-cli expect jq

      - name: Install Docker
        run: |
          curl -fsSL https://get.docker.com -o get-docker.sh
          sudo sh get-docker.sh
          sudo usermod -aG docker $USER
          sudo systemctl start docker

      - name: Install Pterodactyl Panel (only)
        run: |
          wget -q -O /tmp/installer.sh https://pterodactyl-installer.se
          chmod +x /tmp/installer.sh
          sudo expect << 'EOF'
          spawn bash /tmp/installer.sh
          expect "Select option:" { send "0\r" }
          expect "Do you want to automatically configure UFW?" { send "n\r" }
          expect "Do you want to automatically configure HTTPS using Let's Encrypt?" { send "n\r" }
          expect "Email address for SSL certificate:" { send "\r" }
          expect "Do you want to continue with the installation?" { send "y\r" }
          expect "MySQL root password:" { send "rootpass123\r" }
          expect "Confirm password:" { send "rootpass123\r" }
          expect "Enter database name for panel:" { send "panel\r" }
          expect "Enter database username for panel:" { send "pterodactyl\r" }
          expect "Enter database password for panel:" { send "panelpass123\r" }
          expect "Enter FQDN (domain or IP):" { send "localhost\r" }
          expect "Do you want to configure an email environment?" { send "n\r" }
          expect "Do you want to create an admin user now?" { send "y\r" }
          expect "Email:" { send "${{ github.event.inputs.admin_email }}\r" }
          expect "Username:" { send "${{ github.event.inputs.admin_user }}\r" }
          expect "First Name:" { send "Admin\r" }
          expect "Last Name:" { send "User\r" }
          expect "Password:" { send "${{ github.event.inputs.admin_pass }}\r" }
          expect "Confirm Password:" { send "${{ github.event.inputs.admin_pass }}\r" }
          expect eof
          EOF

      - name: Configure Nginx (port 8080)
        run: |
          sudo tee /etc/nginx/sites-available/pterodactyl > /dev/null << 'NGINX'
          server {
              listen 8080;
              server_name localhost;
              root /var/www/pterodactyl/public;
              index index.php;
              location / {
                  try_files $uri $uri/ /index.php?$query_string;
              }
              location ~ \.php$ {
                  include snippets/fastcgi-php.conf;
                  fastcgi_pass unix:/var/run/php/php8.1-fpm.sock;
              }
          }
          NGINX
          sudo ln -sf /etc/nginx/sites-available/pterodactyl /etc/nginx/sites-enabled/
          sudo rm -f /etc/nginx/sites-enabled/default
          sudo systemctl restart php8.1-fpm
          sudo nginx -t && sudo systemctl restart nginx

      - name: Expose panel via Cloudflare Tunnel (trycloudflare)
        run: |
          curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
          chmod +x cloudflared
          ./cloudflared tunnel --url http://localhost:8080 --logfile /tmp/cf.log &
          sleep 10
          PANEL_URL=$(grep -o 'https://.*\.trycloudflare.com' /tmp/cf.log | head -1)
          echo "PANEL_URL=$PANEL_URL" >> $GITHUB_ENV
          echo "Panel URL: $PANEL_URL"

      - name: Wait panel ready
        run: |
          for i in {1..30}; do
            if curl -s -o /dev/null -w "%{http_code}" "$PANEL_URL" | grep -q "200\|302"; then
              break
            fi
            sleep 2
          done

      - name: Get API token
        id: login
        run: |
          RESP=$(curl -s -X POST "$PANEL_URL/api/auth/login" \
            -H "Content-Type: application/json" \
            -d '{"email":"${{ github.event.inputs.admin_email }}","password":"${{ github.event.inputs.admin_pass }}"}')
          TOKEN=$(echo $RESP | jq -r '.data.token')
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Create location & node via API
        run: |
          # Location
          LOC_RESP=$(curl -s -X POST "$PANEL_URL/api/application/locations" \
            -H "Authorization: Bearer ${{ steps.login.outputs.token }}" \
            -H "Content-Type: application/json" \
            -d '{"short":"main","long":"Main Location"}')
          LOC_ID=$(echo $LOC_RESP | jq -r '.data.id')
          # Node
          NODE_RESP=$(curl -s -X POST "$PANEL_URL/api/application/nodes" \
            -H "Authorization: Bearer ${{ steps.login.outputs.token }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"name\": \"Main Node\",
              \"location_id\": $LOC_ID,
              \"fqdn\": \"$PANEL_URL\",
              \"scheme\": \"https\",
              \"memory\": 4096,
              \"memory_overallocate\": 0,
              \"disk\": 51200,
              \"disk_overallocate\": 0,
              \"upload_size\": 100,
              \"daemon_listen_port\": 8080,
              \"daemon_sftp_port\": 2022,
              \"public\": true
            }")
          NODE_ID=$(echo $NODE_RESP | jq -r '.data.id')
          echo "NODE_ID=$NODE_ID" >> $GITHUB_ENV
          # Allocation
          curl -s -X POST "$PANEL_URL/api/application/nodes/$NODE_ID/allocations" \
            -H "Authorization: Bearer ${{ steps.login.outputs.token }}" \
            -H "Content-Type: application/json" \
            -d "{\"ip\":\"$PANEL_URL\",\"ports\":[\"25565\"]}"

      - name: Install Wings
        run: |
          sudo curl -L -o /usr/local/bin/wings "https://github.com/pterodactyl/wings/releases/latest/download/wings_linux_amd64"
          sudo chmod u+x /usr/local/bin/wings
          # Dapatkan token wings dari node
          WINGS_TOKEN=$(curl -s -X GET "$PANEL_URL/api/application/nodes/$NODE_ID/configuration" \
            -H "Authorization: Bearer ${{ steps.login.outputs.token }}" | jq -r '.data.token')
          sudo mkdir -p /etc/pterodactyl
          sudo tee /etc/pterodactyl/config.yml > /dev/null << CFG
          api:
            host: "$PANEL_URL"
            port: 443
            ssl: true
            token: "$WINGS_TOKEN"
          system:
            data: "/var/lib/pterodactyl/volumes"
            log_directory: "/var/log/pterodactyl"
          remote: "$PANEL_URL"
          CFG
          # Jalankan wings di background (tanpa systemd)
          sudo wings --debug > /tmp/wings.log 2>&1 &
          sleep 10
          if pgrep -f "wings" > /dev/null; then
            echo "✅ Wings running, node should be green"
          else
            echo "⚠️ Wings gagal start, cek log"
            cat /tmp/wings.log
          fi

      - name: Keep alive for 6 hours
        run: |
          echo "========================================="
          echo "Panel URL: ${{ env.PANEL_URL }}"
          echo "Admin: ${{ github.event.inputs.admin_user }}"
          echo "Password: ${{ github.event.inputs.admin_pass }}"
          echo "Node ID: ${{ env.NODE_ID }} (should be green)"
          echo "Job akan berjalan selama 6 jam. Tekan Cancel untuk stop."
          echo "========================================="
          sleep 21600
