name: Free VPS + Pterodactyl (Quick Tunnel)

on:
  workflow_dispatch:
    inputs:
      admin_email:
        description: "Email admin Pterodactyl"
        required: true
        default: "admin@example.com"
      admin_user:
        description: "Username admin Pterodactyl"
        required: true
        default: "admin"
      admin_pass:
        description: "Password admin (min 8 char)"
        required: true
        default: "ChangeMe123!"
      enable_tmate:
        description: "Aktifin SSH tmate ke runner?"
        required: true
        default: "true"
      ddos_test:
        description: "Jalanin stress-test anti-DDoS ke panel sendiri? (true/false)"
        required: true
        default: "false"

jobs:
  pterodactyl:
    runs-on: ubuntu-22.04
    timeout-minutes: 350

    steps:
      - name: Info awal
        run: |
          echo "=========================================="
          echo " Free VPS Pterodactyl + Quick Tunnel"
          echo " Admin: ${{ github.event.inputs.admin_user }} / ${{ github.event.inputs.admin_email }}"
          echo " Max run: ~5j50m (limit GitHub 6 jam)"
          echo "=========================================="

      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y software-properties-common curl apt-transport-https ca-certificates gnupg lsb-release tar unzip git redis-server jq cron hping3 apache2-utils
          sudo add-apt-repository -y ppa:ondrej/php
          curl -sS https://downloads.mariadb.com/MariaDB/mariadb_repo_setup | sudo bash
          sudo apt-get update -y
          sudo apt-get install -y \
            php8.1 php8.1-{cli,gd,mysql,pdo,mbstring,tokenizer,bcmath,xml,fpm,curl,zip,redis} \
            mariadb-server nginx
          curl -sS https://getcomposer.org/installer | sudo php -- --install-dir=/usr/local/bin --filename=composer
          curl -fsSL https://get.docker.com | sudo sh
          sudo systemctl enable --now docker redis-server mariadb

      - name: Install cloudflared
        run: |
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb

      - name: Start Quick Tunnel buat Panel (port 80) & ambil URL
        run: |
          nohup cloudflared tunnel --no-autoupdate --url http://localhost:80 > /tmp/cf-panel.log 2>&1 &
          echo $! > /tmp/cf-panel.pid
          for i in {1..40}; do
            URL=$(grep -Eo 'https://[a-zA-Z0-9.-]+\.trycloudflare\.com' /tmp/cf-panel.log | head -n1 || true)
            if [ -n "$URL" ]; then break; fi
            sleep 2
          done
          if [ -z "$URL" ]; then echo "Gagal ambil URL panel"; cat /tmp/cf-panel.log; exit 1; fi
          PANEL_FQDN=$(echo "$URL" | sed 's#https://##')
          echo "PANEL_URL=$URL" >> $GITHUB_ENV
          echo "PANEL_FQDN=$PANEL_FQDN" >> $GITHUB_ENV
          echo "Panel URL: $URL"

      - name: Start Quick Tunnel buat Wings (port 8080) & ambil URL
        run: |
          nohup cloudflared tunnel --no-autoupdate --url https://localhost:8080 --no-tls-verify > /tmp/cf-wings.log 2>&1 &
          echo $! > /tmp/cf-wings.pid
          for i in {1..40}; do
            URL=$(grep -Eo 'https://[a-zA-Z0-9.-]+\.trycloudflare\.com' /tmp/cf-wings.log | head -n1 || true)
            if [ -n "$URL" ]; then break; fi
            sleep 2
          done
          if [ -z "$URL" ]; then echo "Gagal ambil URL wings"; cat /tmp/cf-wings.log; exit 1; fi
          WINGS_FQDN=$(echo "$URL" | sed 's#https://##')
          echo "WINGS_URL=$URL" >> $GITHUB_ENV
          echo "WINGS_FQDN=$WINGS_FQDN" >> $GITHUB_ENV
          echo "Wings URL: $URL"

      - name: Setup vars
        run: |
          echo "DB_PASS=$(openssl rand -hex 16)" >> $GITHUB_ENV

      - name: Setup MariaDB & DB Pterodactyl
        run: |
          sudo mysql -u root <<SQL
          CREATE USER 'pterodactyl'@'127.0.0.1' IDENTIFIED BY '${{ env.DB_PASS }}';
          CREATE DATABASE panel;
          GRANT ALL PRIVILEGES ON panel.* TO 'pterodactyl'@'127.0.0.1' WITH GRANT OPTION;
          FLUSH PRIVILEGES;
          SQL

      - name: Download & Install Panel
        run: |
          sudo mkdir -p /var/www/pterodactyl
          cd /var/www/pterodactyl
          sudo curl -Lo panel.tar.gz https://github.com/pterodactyl/panel/releases/latest/download/panel.tar.gz
          sudo tar -xzf panel.tar.gz
          sudo chmod -R 755 storage/* bootstrap/cache/
          sudo cp .env.example .env
          sudo composer install --no-dev --optimize-autoloader --no-interaction
          sudo php artisan key:generate --force

      - name: Configure Panel (.env + DB + admin)
        run: |
          cd /var/www/pterodactyl
          sudo php artisan p:environment:setup \
            --author="${{ github.event.inputs.admin_email }}" \
            --url="${{ env.PANEL_URL }}" \
            --timezone="UTC" \
            --cache="redis" --session="redis" --queue="redis" \
            --redis-host="127.0.0.1" --redis-pass="null" --redis-port="6379" \
            --settings-ui=true
          sudo php artisan p:environment:database \
            --host="127.0.0.1" --port="3306" --database="panel" \
            --username="pterodactyl" --password="${{ env.DB_PASS }}"
          sudo php artisan migrate --seed --force
          sudo php artisan p:user:make \
            --email="${{ github.event.inputs.admin_email }}" \
            --username="${{ github.event.inputs.admin_user }}" \
            --name-first="Admin" --name-last="User" \
            --password="${{ github.event.inputs.admin_pass }}" --admin=1
          sudo chown -R www-data:www-data /var/www/pterodactyl/*

      - name: Setup queue worker & cron
        run: |
          (sudo crontab -l 2>/dev/null; echo "* * * * * php /var/www/pterodactyl/artisan schedule:run >> /dev/null 2>&1") | sudo crontab -
          sudo tee /etc/systemd/system/pteroq.service > /dev/null <<EOF
          [Unit]
          Description=Pterodactyl Queue Worker
          After=redis-server.service
          [Service]
          User=www-data
          Group=www-data
          Restart=always
          ExecStart=/usr/bin/php /var/www/pterodactyl/artisan queue:work --queue=high,standard,low --sleep=3 --tries=3
          RestartSec=5s
          [Install]
          WantedBy=multi-user.target
          EOF
          sudo systemctl daemon-reload
          sudo systemctl enable --now pteroq.service

      - name: Configure Nginx
        run: |
          sudo rm -f /etc/nginx/sites-enabled/default
          sudo tee /etc/nginx/sites-available/pterodactyl.conf > /dev/null <<'NGINX'
          server {
              listen 80 default_server;
              server_name _;
              root /var/www/pterodactyl/public;
              index index.php;
              client_max_body_size 100m;
              sendfile off;
              location / { try_files $uri $uri/ /index.php?$query_string; }
              location ~ \.php$ {
                  fastcgi_split_path_info ^(.+\.php)(/.+)$;
                  fastcgi_pass unix:/run/php/php8.1-fpm.sock;
                  fastcgi_index index.php;
                  include fastcgi_params;
                  fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
                  fastcgi_param HTTP_PROXY "";
                  fastcgi_read_timeout 300;
              }
              location ~ /\.ht { deny all; }
          }
          NGINX
          sudo ln -sf /etc/nginx/sites-available/pterodactyl.conf /etc/nginx/sites-enabled/pterodactyl.conf
          sudo systemctl restart php8.1-fpm nginx

      - name: Install Wings
        run: |
          sudo mkdir -p /etc/pterodactyl /var/lib/pterodactyl/volumes
          sudo curl -L -o /usr/local/bin/wings "https://github.com/pterodactyl/wings/releases/latest/download/wings_linux_amd64"
          sudo chmod u+x /usr/local/bin/wings
          sudo tee /etc/systemd/system/wings.service > /dev/null <<EOF
          [Unit]
          Description=Pterodactyl Wings Daemon
          After=docker.service
          Requires=docker.service
          PartOf=docker.service
          [Service]
          User=root
          WorkingDirectory=/etc/pterodactyl
          LimitNOFILE=4096
          PIDFile=/var/run/wings/daemon.pid
          ExecStart=/usr/local/bin/wings
          Restart=on-failure
          RestartSec=5s
          [Install]
          WantedBy=multi-user.target
          EOF
          sudo systemctl daemon-reload

      - name: Auto-create Location, Node & Allocation
        run: |
          cd /var/www/pterodactyl
          sudo php artisan p:location:make --short="auto" --long="Auto Location" || true
          LOC_ID=$(sudo mysql -u pterodactyl -p${{ env.DB_PASS }} -h 127.0.0.1 -N -e "SELECT id FROM panel.locations LIMIT 1;")
          DAEMON_TOKEN=$(openssl rand -hex 32)
          DAEMON_TOKEN_ID=$(openssl rand -hex 8)
          sudo mysql -u pterodactyl -p${{ env.DB_PASS }} -h 127.0.0.1 panel <<SQL
          INSERT INTO nodes (uuid, public, name, description, location_id, fqdn, scheme, behind_proxy, memory, memory_overallocate, disk, disk_overallocate, upload_size, daemon_token_id, daemon_token, daemonListen, daemonSFTP, daemonBase, created_at, updated_at)
          VALUES (UUID(), 1, 'AutoNode', 'Auto created', $LOC_ID, '${{ env.WINGS_FQDN }}', 'https', 1, 8192, 0, 50000, 0, 100, '$DAEMON_TOKEN_ID', '$DAEMON_TOKEN', 8080, 2022, '/var/lib/pterodactyl/volumes', NOW(), NOW());
          SQL
          NODE_ID=$(sudo mysql -u pterodactyl -p${{ env.DB_PASS }} -h 127.0.0.1 -N -e "SELECT id FROM panel.nodes ORDER BY id DESC LIMIT 1;")
          sudo php artisan p:node:allocations --node=$NODE_ID --ip=0.0.0.0 --ports="25565-25575" || true
          sudo php artisan p:node:configuration $NODE_ID | sudo tee /etc/pterodactyl/config.yml > /dev/null
          sudo systemctl enable --now wings
          sleep 8
          sudo systemctl status wings --no-pager || true

      - name: Hasil install
        run: |
          echo "=========================================="
          echo " SELESAI! Login panel:"
          echo " URL  : ${{ env.PANEL_URL }}"
          echo " User : ${{ github.event.inputs.admin_user }}"
          echo " Pass : ${{ github.event.inputs.admin_pass }}"
          echo " Wings: ${{ env.WINGS_URL }}"
          echo "=========================================="
          echo " Tunggu ~30 detik, refresh Admin > Nodes"
          echo " buat liat node hijau."
          echo "=========================================="

      - name: Stress test (anti-DDoS check ke panel sendiri)
        if: ${{ github.event.inputs.ddos_test == 'true' }}
        run: |
          echo "=== Test 1: ApacheBench - 5000 req, 200 concurrent ==="
          ab -n 5000 -c 200 "${{ env.PANEL_URL }}/" || true
          echo ""
          echo "=== Test 2: Burst HTTP flood (curl loop, 500 req paralel) ==="
          seq 1 500 | xargs -n1 -P50 -I{} curl -s -o /dev/null -w "%{http_code}\n" "${{ env.PANEL_URL }}/" | sort | uniq -c
          echo ""
          echo "=== Test 3: Cek anti-DDoS ==="
          echo "Kalau banyak 403/429/503, berarti anti-DDoS Cloudflare kerja."

      - name: Start tmate SSH (keep alive)
        if: ${{ github.event.inputs.enable_tmate == 'true' }}
        uses: mxschmitt/action-tmate@v3
        with:
          limit-access-to-actor: true
          detached: false
