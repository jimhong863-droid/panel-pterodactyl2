name: Pterodactyl Panel + Wings Auto

on:
  workflow_dispatch:
    inputs:
      admin_email:
        description: 'Email admin'
        required: true
        default: 'admin@panel.com'
      admin_user:
        description: 'Username admin'
        required: true
        default: 'yanzz'
      admin_pass:
        description: 'Password admin'
        required: true
        default: '7819159772'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies & PHP 8.1
        run: |
          sudo apt update
          sudo apt install -y software-properties-common
          sudo add-apt-repository -y ppa:ondrej/php
          sudo apt update
          sudo apt install -y nginx mariadb-server redis-server php8.1-fpm php8.1-cli php8.1-common \
            php8.1-curl php8.1-mbstring php8.1-xml php8.1-bcmath php8.1-zip php8.1-mysql curl wget expect jq
          sudo systemctl start nginx mysql redis php8.1-fpm
          sudo systemctl enable nginx mysql redis php8.1-fpm

      - name: Install Docker
        run: |
          curl -fsSL https://get.docker.com -o get-docker.sh
          sudo sh get-docker.sh
          sudo usermod -aG docker $USER
          sudo systemctl start docker

      - name: Install Pterodactyl Panel (non-interactive)
        run: |
          wget -q -O /tmp/installer.sh https://pterodactyl-installer.se
          chmod +x /tmp/installer.sh
          sudo expect << EOF
          set timeout 600
          spawn bash /tmp/installer.sh
          expect "Select option:" { send "0\r" }
          expect "Do you want to automatically configure UFW?" { send "n\r" }
          expect "Do you want to automatically configure HTTPS using Let's Encrypt?" { send "n\r" }
          expect "Email address for SSL certificate:" { send "\r" }
          expect "Do you want to continue with the installation?" { send "y\r" }
          expect "MySQL root password:" { send "rootpass123\r" }
          expect "Confirm password:" { send "rootpass123\r" }
          expect "Enter database name for panel:" { send "panel\r" }
          expect "Enter database username for panel:" { send "pterodactyl\r" }
          expect "Enter database password for panel:" { send "panelpass123\r" }
          expect "Enter FQDN (domain or IP):" { send "localhost\r" }
          expect "Do you want to configure an email environment?" { send "n\r" }
          expect "Do you want to create an admin user now?" { send "y\r" }
          expect "Email:" { send "${{ github.event.inputs.admin_email }}\r" }
          expect "Username:" { send "${{ github.event.inputs.admin_user }}\r" }
          expect "First Name:" { send "Admin\r" }
          expect "Last Name:" { send "User\r" }
          expect "Password:" { send "${{ github.event.inputs.admin_pass }}\r" }
          expect "Confirm Password:" { send "${{ github.event.inputs.admin_pass }}\r" }
          expect eof
          EOF

      - name: Configure Nginx on port 8080
        run: |
          sudo tee /etc/nginx/sites-available/pterodactyl > /dev/null << 'NGINX'
          server {
              listen 8080;
              server_name localhost;
              root /var/www/pterodactyl/public;
              index index.php;
              location / {
                  try_files $uri $uri/ /index.php?$query_string;
              }
              location ~ \.php$ {
                  include snippets/fastcgi-php.conf;
                  fastcgi_pass unix:/var/run/php/php8.1-fpm.sock;
              }
          }
          NGINX
          sudo ln -sf /etc/nginx/sites-available/pterodactyl /etc/nginx/sites-enabled/
          sudo rm -f /etc/nginx/sites-enabled/default
          sudo systemctl restart php8.1-fpm
          sudo nginx -t && sudo systemctl restart nginx

      - name: Expose panel via Cloudflare Tunnel
        id: tunnel
        run: |
          curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
          chmod +x cloudflared
          ./cloudflared tunnel --url http://localhost:8080 --logfile /tmp/cf.log &
          sleep 12
          PANEL_URL=$(grep -o 'https://[a-zA-Z0-9.-]*\.trycloudflare.com' /tmp/cf.log | head -1)
          echo "PANEL_URL=$PANEL_URL" >> $GITHUB_ENV
          echo "PANEL_URL=$PANEL_URL" >> $GITHUB_OUTPUT

      - name: Wait panel ready
        run: |
          for i in {1..40}; do
            if curl -s -f -o /dev/null "$PANEL_URL"; then
              echo "Panel is up"
              break
            fi
            echo "Waiting for panel... $i"
            sleep 3
          done

      - name: Get API token
        id: login
        run: |
          sleep 5
          RESP=$(curl -s -X POST "$PANEL_URL/api/auth/login" \
            -H "Content-Type: application/json" \
            -d '{"email":"${{ github.event.inputs.admin_email }}","password":"${{ github.event.inputs.admin_pass }}"}')
          TOKEN=$(echo $RESP | jq -r '.data.token')
          if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then
            echo "Login failed: $RESP"
            exit 1
          fi
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Create location, node, allocation
        id: node
        run: |
          LOC_ID=$(curl -s -X POST "$PANEL_URL/api/application/locations" \
            -H "Authorization: Bearer ${{ steps.login.outputs.token }}" \
            -H "Content-Type: application/json" \
            -d '{"short":"main","long":"Main"}' | jq -r '.data.id')
          NODE_RESP=$(curl -s -X POST "$PANEL_URL/api/application/nodes" \
            -H "Authorization: Bearer ${{ steps.login.outputs.token }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"name\": \"Node1\",
              \"location_id\": $LOC_ID,
              \"fqdn\": \"$PANEL_URL\",
              \"scheme\": \"https\",
              \"memory\": 4096,
              \"memory_overallocate\": 0,
              \"disk\": 51200,
              \"disk_overallocate\": 0,
              \"upload_size\": 100,
              \"daemon_listen_port\": 8080,
              \"daemon_sftp_port\": 2022,
              \"public\": true
            }")
          NODE_ID=$(echo $NODE_RESP | jq -r '.data.id')
          curl -s -X POST "$PANEL_URL/api/application/nodes/$NODE_ID/allocations" \
            -H "Authorization: Bearer ${{ steps.login.outputs.token }}" \
            -H "Content-Type: application/json" \
            -d "{\"ip\":\"$PANEL_URL\",\"ports\":[\"25565\"]}"
          echo "NODE_ID=$NODE_ID" >> $GITHUB_ENV
          echo "node_id=$NODE_ID" >> $GITHUB_OUTPUT

      - name: Install and start Wings
        run: |
          sudo curl -L -o /usr/local/bin/wings "https://github.com/pterodactyl/wings/releases/latest/download/wings_linux_amd64"
          sudo chmod +x /usr/local/bin/wings
          WINGS_TOKEN=$(curl -s -X GET "$PANEL_URL/api/application/nodes/${{ steps.node.outputs.node_id }}/configuration" \
            -H "Authorization: Bearer ${{ steps.login.outputs.token }}" | jq -r '.data.token')
          sudo mkdir -p /etc/pterodactyl
          sudo tee /etc/pterodactyl/config.yml > /dev/null << CFG
          api:
            host: "$PANEL_URL"
            port: 443
            ssl: true
            token: "$WINGS_TOKEN"
          system:
            data: "/var/lib/pterodactyl/volumes"
            log_directory: "/var/log/pterodactyl"
          remote: "$PANEL_URL"
          CFG
          sudo nohup wings --debug > /tmp/wings.log 2>&1 &
          sleep 15
          if pgrep -f "wings" > /dev/null; then
            echo "✅ Wings running, node green"
          else
            echo "⚠️ Wings failed, check log:"
            cat /tmp/wings.log
            exit 1
          fi

      - name: Display info
        run: |
          echo "========================================="
          echo "✅ Panel: ${{ env.PANEL_URL }}"
          echo "👤 Login: ${{ github.event.inputs.admin_user }}"
          echo "🔑 Pass: ${{ github.event.inputs.admin_pass }}"
          echo "🟢 Node: ${{ env.NODE_ID }} - Green (online)"
          echo "Job will keep running for 6 hours."
          echo "========================================="
          sleep 21600
