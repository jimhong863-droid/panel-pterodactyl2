name: Free VPS + Pterodactyl (Quick Tunnel)

on:
  workflow_dispatch:
    inputs:
      admin_email:
        description: "Email admin"
        required: true
        default: "yanz@example.com"
      admin_user:
        description: "Username admin"
        required: true
        default: "yanz"
      admin_pass:
        description: "Password admin"
        required: true
        default: "7819159772"
      enable_tmate:
        description: "Aktifin SSH tmate?"
        required: true
        default: "true"

jobs:
  pterodactyl:
    runs-on: ubuntu-22.04
    timeout-minutes: 350
    defaults:
      run:
        shell: bash

    steps:
      - name: Start service & download paralel + install paket
        run: |
          set -euxo pipefail
          # Service yg udah ada di runner
          sudo systemctl start mysql || true
          sudo systemctl start docker || true
          # Download paralel
          ( curl -fsSL -o /tmp/cf.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb ) &
          ( curl -fsSL -o /tmp/panel.tar.gz https://github.com/pterodactyl/panel/releases/latest/download/panel.tar.gz ) &
          ( curl -fsSL -o /tmp/wings https://github.com/pterodactyl/wings/releases/latest/download/wings_linux_amd64 ) &
          # Install paket sambil tunggu download
          sudo DEBIAN_FRONTEND=noninteractive apt-get update -y
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            nginx redis-server tar cron openssl ca-certificates curl unzip \
            php8.1 php8.1-fpm php8.1-cli php8.1-common php8.1-gd php8.1-mysql \
            php8.1-mbstring php8.1-bcmath php8.1-xml php8.1-curl php8.1-zip
          wait
          test -s /tmp/panel.tar.gz
          test -s /tmp/wings
          test -s /tmp/cf.deb
          sudo dpkg -i /tmp/cf.deb
          sudo install -m 0755 /tmp/wings /usr/local/bin/wings
          sudo systemctl enable --now redis-server php8.1-fpm
          # Install composer (gak ada built-in di runner)
          curl -fsSL https://getcomposer.org/installer -o /tmp/composer-setup.php
          sudo php /tmp/composer-setup.php --install-dir=/usr/local/bin --filename=composer
          mysql --version && php -v && docker --version && composer --version

      - name: Start Quick Tunnel & ambil URL
        run: |
          set -euxo pipefail
          nohup cloudflared tunnel --no-autoupdate --url http://localhost:80 > /tmp/cf-panel.log 2>&1 &
          nohup cloudflared tunnel --no-autoupdate --url https://localhost:8080 --no-tls-verify > /tmp/cf-wings.log 2>&1 &
          PANEL_URL=""; WINGS_URL=""
          for i in {1..90}; do
            [ -z "$PANEL_URL" ] && PANEL_URL=$(grep -Eo 'https://[a-zA-Z0-9.-]+\.trycloudflare\.com' /tmp/cf-panel.log | head -n1 || true)
            [ -z "$WINGS_URL" ]  && WINGS_URL=$(grep -Eo 'https://[a-zA-Z0-9.-]+\.trycloudflare\.com' /tmp/cf-wings.log | head -n1 || true)
            [ -n "$PANEL_URL" ] && [ -n "$WINGS_URL" ] && break
            sleep 2
          done
          [ -z "$PANEL_URL" ] && { echo "==CF PANEL LOG=="; cat /tmp/cf-panel.log; exit 1; }
          [ -z "$WINGS_URL" ]  && { echo "==CF WINGS LOG=="; cat /tmp/cf-wings.log; exit 1; }
          {
            echo "PANEL_URL=$PANEL_URL"
            echo "WINGS_URL=$WINGS_URL"
            echo "WINGS_FQDN=${WINGS_URL#https://}"
            echo "DB_PASS=$(openssl rand -hex 16)"
          } >> "$GITHUB_ENV"
          echo "Panel : $PANEL_URL"
          echo "Wings : $WINGS_URL"

      - name: Setup Database (MySQL pre-installed di runner GitHub)
        run: |
          set -euxo pipefail
          # Root password default di runner GitHub = "root"
          mysql -u root -proot -e "CREATE DATABASE IF NOT EXISTS panel CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;"
          mysql -u root -proot -e "CREATE USER IF NOT EXISTS 'pterodactyl'@'127.0.0.1' IDENTIFIED BY '${{ env.DB_PASS }}';"
          mysql -u root -proot -e "GRANT ALL PRIVILEGES ON panel.* TO 'pterodactyl'@'127.0.0.1' WITH GRANT OPTION;"
          mysql -u root -proot -e "FLUSH PRIVILEGES;"
          # Tes konek pake user baru
          mysql -u pterodactyl -p"${{ env.DB_PASS }}" -h 127.0.0.1 -e "SHOW DATABASES;"

      - name: Extract Panel + composer install + .env
        run: |
          set -euxo pipefail
          sudo mkdir -p /var/www/pterodactyl
          sudo tar -xzf /tmp/panel.tar.gz -C /var/www/pterodactyl
          test -f /var/www/pterodactyl/artisan
          cd /var/www/pterodactyl
          sudo cp .env.example .env
          sudo chmod -R 755 storage bootstrap/cache
          # Install dependencies (vendor/ gak ke-bundle di tarball baru)
          sudo COMPOSER_ALLOW_SUPERUSER=1 composer install \
            --no-dev --optimize-autoloader --no-interaction --prefer-dist
          test -f /var/www/pterodactyl/vendor/autoload.php

      - name: Configure Panel (env, migrate, admin user)
        run: |
          set -euxo pipefail
          cd /var/www/pterodactyl
          sudo php artisan key:generate --force
          sudo php artisan p:environment:setup \
            --author="${{ github.event.inputs.admin_email }}" \
            --url="${{ env.PANEL_URL }}" \
            --timezone="UTC" \
            --cache="redis" \
            --session="redis" \
            --queue="redis" \
            --redis-host="127.0.0.1" \
            --redis-pass="null" \
            --redis-port="6379" \
            --settings-ui=true
          sudo php artisan p:environment:database \
            --host="127.0.0.1" \
            --port="3306" \
            --database="panel" \
            --username="pterodactyl" \
            --password="${{ env.DB_PASS }}"
          sudo php artisan migrate --seed --force
          sudo php artisan p:user:make \
            --email="${{ github.event.inputs.admin_email }}" \
            --username="${{ github.event.inputs.admin_user }}" \
            --name-first="Admin" \
            --name-last="User" \
            --password="${{ github.event.inputs.admin_pass }}" \
            --admin=1
          sudo chown -R www-data:www-data /var/www/pterodactyl

      - name: Queue worker (systemd) + Cron
        run: |
          set -euxo pipefail
          (sudo crontab -l 2>/dev/null; echo "* * * * * php /var/www/pterodactyl/artisan schedule:run >> /dev/null 2>&1") | sudo crontab -
          sudo tee /etc/systemd/system/pteroq.service > /dev/null <<'EOF'
          [Unit]
          Description=Pterodactyl Queue Worker
          After=redis-server.service
          [Service]
          User=www-data
          Group=www-data
          Restart=always
          ExecStart=/usr/bin/php /var/www/pterodactyl/artisan queue:work --queue=high,standard,low --sleep=3 --tries=3
          StartLimitInterval=180
          StartLimitBurst=30
          RestartSec=5s
          [Install]
          WantedBy=multi-user.target
          EOF
          sudo systemctl daemon-reload
          sudo systemctl enable --now pteroq.service

      - name: Nginx (rate-limit + security headers)
        run: |
          set -euxo pipefail
          sudo rm -f /etc/nginx/sites-enabled/default
          sudo tee /etc/nginx/conf.d/ratelimit.conf > /dev/null <<'EOF'
          limit_req_zone $binary_remote_addr zone=panel_rl:10m rate=20r/s;
          limit_conn_zone $binary_remote_addr zone=panel_conn:10m;
          EOF
          sudo tee /etc/nginx/sites-available/pterodactyl.conf > /dev/null <<'NGINX'
          server {
              listen 80 default_server;
              server_name _;
              root /var/www/pterodactyl/public;
              index index.php;
              client_max_body_size 100m;
              client_body_timeout 120s;
              sendfile off;
              limit_req zone=panel_rl burst=40 nodelay;
              limit_conn panel_conn 30;
              add_header X-Frame-Options "SAMEORIGIN" always;
              add_header X-Content-Type-Options "nosniff" always;
              add_header X-XSS-Protection "1; mode=block" always;
              add_header Referrer-Policy "strict-origin-when-cross-origin" always;
              location / { try_files $uri $uri/ /index.php?$query_string; }
              location ~ \.php$ {
                  fastcgi_split_path_info ^(.+\.php)(/.+)$;
                  fastcgi_pass unix:/run/php/php8.1-fpm.sock;
                  fastcgi_index index.php;
                  include fastcgi_params;
                  fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
                  fastcgi_param HTTP_PROXY "";
                  fastcgi_intercept_errors off;
                  fastcgi_buffer_size 16k;
                  fastcgi_buffers 4 16k;
                  fastcgi_connect_timeout 300;
                  fastcgi_send_timeout 300;
                  fastcgi_read_timeout 300;
              }
              location ~ /\.(ht|git|env) { deny all; return 404; }
          }
          NGINX
          sudo ln -sf /etc/nginx/sites-available/pterodactyl.conf /etc/nginx/sites-enabled/pterodactyl.conf
          sudo nginx -t
          sudo systemctl restart php8.1-fpm nginx

      - name: Wings + Auto-create Location, Node & Allocations
        run: |
          set -euxo pipefail
          sudo mkdir -p /etc/pterodactyl /var/lib/pterodactyl/volumes
          sudo tee /etc/systemd/system/wings.service > /dev/null <<'EOF'
          [Unit]
          Description=Pterodactyl Wings Daemon
          After=docker.service
          Requires=docker.service
          PartOf=docker.service
          [Service]
          User=root
          WorkingDirectory=/etc/pterodactyl
          LimitNOFILE=4096
          PIDFile=/var/run/wings/daemon.pid
          ExecStart=/usr/local/bin/wings
          Restart=on-failure
          StartLimitInterval=180
          StartLimitBurst=30
          RestartSec=5s
          [Install]
          WantedBy=multi-user.target
          EOF
          sudo systemctl daemon-reload
          cd /var/www/pterodactyl

          # Auto-create Location
          sudo php artisan p:location:make --short="auto" --long="Auto Location" || true
          LOC_ID=$(mysql -u pterodactyl -p"${{ env.DB_PASS }}" -h 127.0.0.1 -N -e "SELECT id FROM panel.locations LIMIT 1;")
          [ -z "$LOC_ID" ] && { echo "Location gagal dibuat"; exit 1; }

          # Auto-create Node via SQL (Pterodactyl gak ada CLI buat node)
          DAEMON_TOKEN=$(openssl rand -hex 32)
          DAEMON_TOKEN_ID=$(openssl rand -hex 8)
          mysql -u pterodactyl -p"${{ env.DB_PASS }}" -h 127.0.0.1 panel <<SQL
          INSERT INTO nodes
            (uuid, public, name, description, location_id, fqdn, scheme, behind_proxy, maintenance_mode,
             memory, memory_overallocate, disk, disk_overallocate, upload_size,
             daemon_token_id, daemon_token, daemonListen, daemonSFTP, daemonBase, created_at, updated_at)
          VALUES
            (UUID(), 1, 'AutoNode', 'Auto-created node', $LOC_ID, '${{ env.WINGS_FQDN }}', 'https', 1, 0,
             8192, 0, 50000, 0, 100,
             '$DAEMON_TOKEN_ID', '$DAEMON_TOKEN', 8080, 2022, '/var/lib/pterodactyl/volumes', NOW(), NOW());
          SQL
          NODE_ID=$(mysql -u pterodactyl -p"${{ env.DB_PASS }}" -h 127.0.0.1 -N -e "SELECT id FROM panel.nodes ORDER BY id DESC LIMIT 1;")
          [ -z "$NODE_ID" ] && { echo "Node gagal dibuat"; exit 1; }

          # Allocations (port 25565-25575)
          sudo php artisan p:node:allocations --node="$NODE_ID" --ip="0.0.0.0" --ports="25565-25575" || true

          # Generate Wings config & start
          sudo php artisan p:node:configuration "$NODE_ID" | sudo tee /etc/pterodactyl/config.yml > /dev/null
          test -s /etc/pterodactyl/config.yml
          sudo systemctl enable --now wings
          sleep 5
          sudo systemctl status wings --no-pager || true

      - name: Hasil
        run: |
          echo "=========================================="
          echo " SELESAI! Login Pterodactyl Panel:"
          echo " URL   : ${{ env.PANEL_URL }}"
          echo " User  : ${{ github.event.inputs.admin_user }}"
          echo " Pass  : ${{ github.event.inputs.admin_pass }}"
          echo " Email : ${{ github.event.inputs.admin_email }}"
          echo " Wings : ${{ env.WINGS_URL }}"
          echo "=========================================="

      - name: tmate SSH (opsional)
        if: ${{ github.event.inputs.enable_tmate == 'true' }}
        uses: mxschmitt/action-tmate@v3
        with:
          limit-access-to-actor: true
          detached: false
