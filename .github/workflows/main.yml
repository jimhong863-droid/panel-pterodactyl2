name: Free VPS + Pterodactyl (Quick Tunnel)

on:
  workflow_dispatch:
    inputs:
      admin_email:
        description: "Email admin"
        required: true
        default: "yanz@example.com"
      admin_user:
        description: "Username admin"
        required: true
        default: "yanz"
      admin_pass:
        description: "Password admin"
        required: true
        default: "7819159772"
      enable_tmate:
        description: "Aktifin SSH tmate?"
        required: true
        default: "false"

jobs:
  pterodactyl:
    runs-on: ubuntu-22.04
    timeout-minutes: 350
    defaults:
      run:
        shell: bash

    steps:
      - name: Start service & download paralel + install paket (PHP 8.3)
        run: |
          set -euxo pipefail
          sudo systemctl start mysql || true
          sudo systemctl start docker || true
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y software-properties-common
          sudo add-apt-repository -y ppa:ondrej/php
          sudo DEBIAN_FRONTEND=noninteractive apt-get update -y
          ( curl -fsSL -o /tmp/cf.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb ) &
          ( curl -fsSL -o /tmp/panel.tar.gz https://github.com/pterodactyl/panel/releases/latest/download/panel.tar.gz ) &
          ( curl -fsSL -o /tmp/wings https://github.com/pterodactyl/wings/releases/latest/download/wings_linux_amd64 ) &
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            nginx redis-server tar cron openssl ca-certificates curl unzip \
            php8.3 php8.3-fpm php8.3-cli php8.3-common php8.3-gd php8.3-mysql \
            php8.3-mbstring php8.3-bcmath php8.3-xml php8.3-curl php8.3-zip \
            php8.3-tokenizer php8.3-intl php8.3-readline
          wait
          test -s /tmp/panel.tar.gz
          test -s /tmp/wings
          test -s /tmp/cf.deb
          sudo dpkg -i /tmp/cf.deb
          sudo install -m 0755 /tmp/wings /usr/local/bin/wings
          sudo systemctl enable --now redis-server php8.3-fpm
          sudo update-alternatives --set php /usr/bin/php8.3 || true
          curl -fsSL https://getcomposer.org/installer -o /tmp/composer-setup.php
          sudo php /tmp/composer-setup.php --install-dir=/usr/local/bin --filename=composer --version=2.7.7
          mysql --version && php -v && docker --version && composer --version

      - name: Start Quick Tunnel & ambil URL
        run: |
          set -euxo pipefail
          nohup cloudflared tunnel --no-autoupdate --url http://localhost:80 > /tmp/cf-panel.log 2>&1 &
          nohup cloudflared tunnel --no-autoupdate --url http://localhost:8080 > /tmp/cf-wings.log 2>&1 &
          PANEL_URL=""; WINGS_URL=""
          for i in {1..90}; do
            [ -z "$PANEL_URL" ] && PANEL_URL=$(grep -Eo 'https://[a-zA-Z0-9.-]+\.trycloudflare\.com' /tmp/cf-panel.log | head -n1 || true)
            [ -z "$WINGS_URL" ]  && WINGS_URL=$(grep -Eo 'https://[a-zA-Z0-9.-]+\.trycloudflare\.com' /tmp/cf-wings.log | head -n1 || true)
            [ -n "$PANEL_URL" ] && [ -n "$WINGS_URL" ] && break
            sleep 2
          done
          [ -z "$PANEL_URL" ] && { echo "==CF PANEL LOG=="; cat /tmp/cf-panel.log; exit 1; }
          [ -z "$WINGS_URL" ]  && { echo "==CF WINGS LOG=="; cat /tmp/cf-wings.log; exit 1; }
          {
            echo "PANEL_URL=$PANEL_URL"
            echo "WINGS_URL=$WINGS_URL"
            echo "WINGS_FQDN=${WINGS_URL#https://}"
            echo "DB_PASS=$(openssl rand -hex 16)"
          } >> "$GITHUB_ENV"
          echo "Panel : $PANEL_URL"
          echo "Wings : $WINGS_URL"

      - name: Setup Database (MySQL pre-installed di runner GitHub)
        run: |
          set -euxo pipefail
          mysql -u root -proot -e "CREATE DATABASE IF NOT EXISTS panel CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;"
          mysql -u root -proot -e "CREATE USER IF NOT EXISTS 'pterodactyl'@'127.0.0.1' IDENTIFIED BY '${{ env.DB_PASS }}';"
          mysql -u root -proot -e "GRANT ALL PRIVILEGES ON panel.* TO 'pterodactyl'@'127.0.0.1' WITH GRANT OPTION;"
          mysql -u root -proot -e "FLUSH PRIVILEGES;"
          MYSQL_PWD="${{ env.DB_PASS }}" mysql -u pterodactyl -h 127.0.0.1 -e "SHOW DATABASES;"

      - name: Extract Panel + composer install + .env
        run: |
          set -euxo pipefail
          sudo mkdir -p /var/www/pterodactyl
          sudo tar -xzf /tmp/panel.tar.gz -C /var/www/pterodactyl
          test -f /var/www/pterodactyl/artisan
          test -f /var/www/pterodactyl/composer.json
          sudo cp /var/www/pterodactyl/.env.example /var/www/pterodactyl/.env
          sudo chmod -R 755 /var/www/pterodactyl/storage /var/www/pterodactyl/bootstrap/cache
          export COMPOSER_ALLOW_SUPERUSER=1
          export COMPOSER_MEMORY_LIMIT=-1
          sudo -E composer --working-dir=/var/www/pterodactyl install \
            --no-dev --optimize-autoloader --no-interaction \
            --prefer-dist --ignore-platform-reqs --no-progress \
            --no-plugins --no-scripts || {
              echo "==== composer install gagal, retry tanpa --no-plugins ===="
              sudo -E composer --working-dir=/var/www/pterodactyl install \
                --no-dev --optimize-autoloader --no-interaction \
                --prefer-dist --ignore-platform-reqs --no-progress
            }
          sudo -E composer --working-dir=/var/www/pterodactyl dump-autoload --optimize --no-interaction || true
          test -f /var/www/pterodactyl/vendor/autoload.php
          ls -la /var/www/pterodactyl/vendor | head -10

      - name: Configure Panel (env, migrate, admin user)
        run: |
          set -euxo pipefail
          cd /var/www/pterodactyl
          sudo php artisan key:generate --force
          sudo php artisan p:environment:setup \
            --author="${{ github.event.inputs.admin_email }}" \
            --url="${{ env.PANEL_URL }}" \
            --timezone="UTC" \
            --cache="redis" \
            --session="redis" \
            --queue="redis" \
            --redis-host="127.0.0.1" \
            --redis-pass="null" \
            --redis-port="6379" \
            --settings-ui=true
          sudo php artisan p:environment:database \
            --host="127.0.0.1" \
            --port="3306" \
            --database="panel" \
            --username="pterodactyl" \
            --password="${{ env.DB_PASS }}"
          sudo php artisan migrate --seed --force
          sudo php artisan p:user:make \
            --email="${{ github.event.inputs.admin_email }}" \
            --username="${{ github.event.inputs.admin_user }}" \
            --name-first="Admin" \
            --name-last="User" \
            --password="${{ github.event.inputs.admin_pass }}" \
            --admin=1
          sudo chown -R www-data:www-data /var/www/pterodactyl

      - name: Queue worker (systemd) + Cron
        run: |
          set -euxo pipefail
          { sudo crontab -l 2>/dev/null || true; echo "* * * * * php /var/www/pterodactyl/artisan schedule:run >> /dev/null 2>&1"; } | sudo crontab -
          sudo tee /etc/systemd/system/pteroq.service > /dev/null <<'EOF'
          [Unit]
          Description=Pterodactyl Queue Worker
          After=redis-server.service
          [Service]
          User=www-data
          Group=www-data
          Restart=always
          ExecStart=/usr/bin/php /var/www/pterodactyl/artisan queue:work --queue=high,standard,low --sleep=3 --tries=3
          StartLimitInterval=180
          StartLimitBurst=30
          RestartSec=5s
          [Install]
          WantedBy=multi-user.target
          EOF
          sudo systemctl daemon-reload
          sudo systemctl enable --now pteroq.service

      - name: Nginx (rate-limit + security headers)
        run: |
          set -euxo pipefail
          sudo rm -f /etc/nginx/sites-enabled/default
          sudo tee /etc/nginx/conf.d/ratelimit.conf > /dev/null <<'EOF'
          limit_req_zone $binary_remote_addr zone=panel_rl:10m rate=20r/s;
          limit_conn_zone $binary_remote_addr zone=panel_conn:10m;
          EOF
          sudo tee /etc/nginx/sites-available/pterodactyl.conf > /dev/null <<'NGINX'
          server {
              listen 80 default_server;
              server_name _;
              root /var/www/pterodactyl/public;
              index index.php;
              client_max_body_size 100m;
              client_body_timeout 120s;
              sendfile off;
              limit_req zone=panel_rl burst=40 nodelay;
              limit_conn panel_conn 30;
              add_header X-Frame-Options "SAMEORIGIN" always;
              add_header X-Content-Type-Options "nosniff" always;
              add_header X-XSS-Protection "1; mode=block" always;
              add_header Referrer-Policy "strict-origin-when-cross-origin" always;
              location / { try_files $uri $uri/ /index.php?$query_string; }
              location ~ \.php$ {
                  fastcgi_split_path_info ^(.+\.php)(/.+)$;
                  fastcgi_pass unix:/run/php/php8.3-fpm.sock;
                  fastcgi_index index.php;
                  include fastcgi_params;
                  fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
                  fastcgi_param HTTP_PROXY "";
                  fastcgi_intercept_errors off;
                  fastcgi_buffer_size 16k;
                  fastcgi_buffers 4 16k;
                  fastcgi_connect_timeout 300;
                  fastcgi_send_timeout 300;
                  fastcgi_read_timeout 300;
              }
              location ~ /\.(ht|git|env) { deny all; return 404; }
          }
          NGINX
          sudo ln -sf /etc/nginx/sites-available/pterodactyl.conf /etc/nginx/sites-enabled/pterodactyl.conf
          sudo nginx -t
          sudo systemctl restart php8.3-fpm nginx

      - name: Wings + Auto-create Location, Node & Allocations
        run: |
          set -euxo pipefail
          sudo mkdir -p /etc/pterodactyl /var/lib/pterodactyl/volumes

          sudo tee /etc/systemd/system/wings.service > /dev/null <<'EOF'
          [Unit]
          Description=Pterodactyl Wings Daemon
          After=docker.service
          Requires=docker.service
          PartOf=docker.service
          [Service]
          User=root
          WorkingDirectory=/etc/pterodactyl
          LimitNOFILE=4096
          PIDFile=/var/run/wings/daemon.pid
          ExecStart=/usr/local/bin/wings
          Restart=on-failure
          StartLimitInterval=180
          StartLimitBurst=30
          RestartSec=5s
          [Install]
          WantedBy=multi-user.target
          EOF
          sudo systemctl daemon-reload

          # Pake NodeCreationService (jalur resmi Pterodactyl) — biar daemon_token
          # ke-enkripsi sesuai cara panel ekspektasi.
          sudo tee /tmp/setup-node.php > /dev/null <<'PHP'
          <?php
          require '/var/www/pterodactyl/vendor/autoload.php';
          $app = require_once '/var/www/pterodactyl/bootstrap/app.php';
          $kernel = $app->make(Illuminate\Contracts\Console\Kernel::class);
          $kernel->bootstrap();

          $location = \Pterodactyl\Models\Location::firstOrCreate(
              ['short' => 'auto'],
              ['long' => 'Auto Location']
          );

          $creator = app(\Pterodactyl\Services\Nodes\NodeCreationService::class);
          $node = $creator->handle([
              'name'                 => 'AutoNode',
              'description'          => 'Auto-created node',
              'location_id'          => $location->id,
              'public'               => true,
              'fqdn'                 => getenv('WINGS_FQDN'),
              'scheme'               => 'https',
              'behind_proxy'         => true,
              'maintenance_mode'     => false,
              'memory'               => 8192,
              'memory_overallocate'  => 0,
              'disk'                 => 50000,
              'disk_overallocate'    => 0,
              'upload_size'          => 100,
              'daemonListen'         => 8080,
              'daemonSFTP'           => 2022,
              'daemonBase'           => '/var/lib/pterodactyl/volumes',
          ]);

          // Ambil plaintext token buat config Wings.
          // Beberapa versi Pterodactyl nyimpen daemon_token_id plaintext, daemon_token encrypted.
          // Versi lain enkripsi keduanya. Coba decrypt; kalo gagal berarti udah plaintext.
          try { $plainTokenId = \Illuminate\Support\Facades\Crypt::decrypt($node->daemon_token_id); }
          catch (\Throwable $e) { $plainTokenId = $node->daemon_token_id; }
          try { $plainToken = \Illuminate\Support\Facades\Crypt::decrypt($node->daemon_token); }
          catch (\Throwable $e) { $plainToken = $node->daemon_token; }

          for ($p = 25565; $p <= 25575; $p++) {
              \Pterodactyl\Models\Allocation::create([
                  'node_id' => $node->id,
                  'ip'      => '0.0.0.0',
                  'port'    => $p,
              ]);
          }

          $panelUrl = rtrim(getenv('PANEL_URL'), '/');
          $configYaml = <<<YAML
          debug: false
          uuid: {$node->uuid}
          token_id: {$plainTokenId}
          token: {$plainToken}
          api:
            host: 0.0.0.0
            port: 8080
            ssl:
              enabled: false
              cert: ""
              key: ""
            upload_limit: 100
            trusted_proxies:
              - "0.0.0.0/0"
              - "::/0"
          system:
            data: /var/lib/pterodactyl/volumes
            sftp:
              bind_port: 2022
          allowed_mounts: []
          allowed_origins:
            - "*"
          remote: '{$panelUrl}'
          YAML;

          file_put_contents('/tmp/wings-config.yml', $configYaml);
          file_put_contents('/tmp/node_id', (string) $node->id);
          fwrite(STDERR, "Node ID: {$node->id}\n");
          PHP

          sudo -u www-data env \
            WINGS_FQDN="${{ env.WINGS_FQDN }}" \
            PANEL_URL="${{ env.PANEL_URL }}" \
            php /tmp/setup-node.php

          NODE_ID=$(cat /tmp/node_id)
          [ -z "$NODE_ID" ] && { echo "Node gagal dibuat"; exit 1; }
          echo "NODE_ID=$NODE_ID"

          ALLOC_COUNT=$(MYSQL_PWD="${{ env.DB_PASS }}" mysql -u pterodactyl -h 127.0.0.1 -N -e "SELECT COUNT(*) FROM panel.allocations WHERE node_id=$NODE_ID;")
          echo "Allocations dibuat: $ALLOC_COUNT"

          test -s /tmp/wings-config.yml
          sudo cp /tmp/wings-config.yml /etc/pterodactyl/config.yml
          echo "==== /etc/pterodactyl/config.yml ===="
          sudo cat /etc/pterodactyl/config.yml | sed -E 's/(token: ).*/\1***REDACTED***/'

          sudo systemctl enable --now wings
          sleep 8
          sudo systemctl status wings --no-pager || true
          echo "==== wings logs (last 40) ===="
          sudo journalctl -u wings --no-pager -n 40 || true

          echo "==== Test koneksi panel -> wings via tunnel ===="
          curl -fsS -o /dev/null -w "Wings tunnel HTTP %{http_code}\n" "https://${{ env.WINGS_FQDN }}/" || echo "Wings tunnel belum reachable (kadang butuh 10-20 detik)"

      - name: Hasil
        run: |
          echo "=========================================="
          echo " SELESAI! Login Pterodactyl Panel:"
          echo " URL   : ${{ env.PANEL_URL }}"
          echo " User  : ${{ github.event.inputs.admin_user }}"
          echo " Pass  : ${{ github.event.inputs.admin_pass }}"
          echo " Email : ${{ github.event.inputs.admin_email }}"
          echo " Wings : ${{ env.WINGS_URL }}"
          echo "=========================================="

      - name: tmate SSH (opsional)
        if: ${{ github.event.inputs.enable_tmate == 'true' }}
        uses: mxschmitt/action-tmate@v3
        with:
          limit-access-to-actor: true
          detached: false
